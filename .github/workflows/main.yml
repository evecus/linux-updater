name: Build

on:
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: arm
            goarm: "7"


    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: "0"
        run: |
          SUFFIX=""
          ARCH_TAG="${{ matrix.goarch }}"
          [ "${{ matrix.goarm }}" != "" ] && ARCH_TAG="armv${{ matrix.goarm }}"
          OUTPUT="linux-updater-${GOOS}-${ARCH_TAG}${SUFFIX}"
          go build -ldflags="-s -w" -trimpath -o "$OUTPUT" .
          echo "OUTPUT=$OUTPUT" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.OUTPUT }}
          path: ${{ env.OUTPUT }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    # 修改：如果是 tag 触发 OR 手动触发，则执行
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Generate Tag Name
        id: tag_gen
        run: |
          # 如果是 tag 触发，使用原有 tag；如果是手动触发，生成时间戳 tag
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG_NAME="${github_ref#refs/tags/}"
          else
            # 生成格式为 2026.04.23-0138 的时间戳
            TAG_NAME="manual-$(date +'%Y.%m.%d-%H%M')"
          fi
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          # 使用上面生成的动态 Tag
          tag_name: ${{ steps.tag_gen.outputs.tag }}
          name: Release ${{ steps.tag_gen.outputs.tag }}
          files: dist/*
          generate_release_notes: true
